name: Scrape Prices
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --omit=dev
      - name: Refresh prices
        run: node scripts/refresh-prices.js
        env:
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_WEBHOOK_SECRET: ${{ secrets.DINGTALK_WEBHOOK_SECRET }}
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet price-data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Commit & push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "moza-bot"
          git config user.email "bot@moza-monitor"
          git add price-data.json
          git commit -m "Auto-update price-data.json [skip ci]"
          git push
