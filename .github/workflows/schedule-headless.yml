name: Scrape Headless Prices
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --omit=dev
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Refresh headless prices
        run: node scripts/refresh-prices-headless.js
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet price-data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Commit & push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "moza-bot"
          git config user.email "bot@moza-monitor"
          git add price-data.json
          git commit -m "Auto-update price-data.json (headless) [skip ci]"
          git push
