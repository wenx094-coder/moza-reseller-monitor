<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOZA Price Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f5f5f8;
    --surface: #ffffff;
    --surface2: #eeeff4;
    --surface3: #e2e3ec;
    --border: #d8d9e4;
    --text: #1a1a2e;
    --text2: #8888aa;
    --accent: #e8102a;
    --green: #00c853;
    --yellow: #ffc107;
    --orange: #ff6d00;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  html { font-size: 14px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .header {
    background: linear-gradient(135deg, #ffffff 0%, #f0f0f8 100%);
    border-bottom: 2px solid var(--accent);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-size: 1.3rem; font-weight: 800; letter-spacing: 1px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.1rem; color: white;
  }
  .logo span { color: var(--text); }
  .logo .accent { color: var(--accent); }
  .nav-link {
    background: var(--surface2);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text2);
    text-decoration: none;
    transition: all 0.2s;
  }
  .nav-link:hover { background: var(--accent); color: white; }
  .nav-link.active { background: var(--accent); color: white; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .last-update { font-size: 0.75rem; color: var(--text2); }

  .container { max-width: 1440px; margin: 0 auto; padding: 20px 24px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }
  .stat-card:nth-child(1)::after { background: var(--accent); }
  .stat-card:nth-child(2)::after { background: var(--green); }
  .stat-card:nth-child(3)::after { background: #2196f3; }
  .stat-card:nth-child(4)::after { background: var(--orange); }
  .stat-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 1.8rem; font-weight: 800; }
  .stat-sub { font-size: 0.75rem; color: var(--text2); margin-top: 4px; }

  .controls-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    flex: 1;
    max-width: 320px;
  }
  .search-box input {
    background: none;
    border: none;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    width: 100%;
    font-family: var(--font);
  }
  .search-box input::placeholder { color: var(--text2); }

  .retailer-filter {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    overflow-x: auto;
  }
  .retailer-pill {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface);
    color: var(--text2);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--font);
    transition: all 0.2s;
  }
  .retailer-pill:hover { color: var(--text); background: var(--surface2); border-color: var(--text2); }
  .retailer-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .retailer-pill.continent-active { background: #0d6efd; color: white; border-color: #0d6efd; }

  .product-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .product-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .product-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .product-header:hover { background: var(--surface2); }
  .product-name { font-size: 0.95rem; font-weight: 700; }
  .product-category {
    font-size: 0.7rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--surface3);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .product-summary {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 0.8rem;
  }
  .product-summary .count { color: var(--text2); }
  .product-summary .lowest {
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.78rem;
  }
  .lowest.good { background: #e8f5e9; color: #2e7d32; }
  .lowest.warn { background: #fff3e0; color: #e65100; }
  .lowest.bad { background: #ffebee; color: #c62828; }
  .expand-icon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
    color: var(--text2);
  }
  .expand-icon.open { transform: rotate(180deg); }

  .price-table {
    border-top: 1px solid var(--border);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }
  .price-table.open { max-height: 2000px; }
  .price-table table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .alert-banner {
    background: #fff3e0;
    border: 1px solid var(--orange);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .alert-banner.show { display: flex; }
  .alert-banner .icon { font-size: 1.2rem; }
  .alert-banner .count { color: var(--accent); }

  .price-table th {
    text-align: left;
    padding: 10px 18px;
    font-size: 0.72rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .price-table td {
    padding: 10px 18px;
    border-bottom: 1px solid var(--surface2);
  }
  .price-table tr:last-child td { border-bottom: none; }
  .price-table tr:hover td { background: var(--surface2); }
  .price-flag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }
  .price-flag .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.red { background: var(--accent); }
  .dot.gray { background: var(--text2); }
  .continent-header-row td { background: var(--surface2); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 12px; color: var(--text2); border-top: 2px solid var(--border); }
  .subcat-header { padding: 10px 14px; margin-top: 4px; font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); border-bottom: 1px solid var(--border); }
  .retailer-name { font-weight: 600; }
  .retailer-country {
    font-size: 0.7rem;
    color: var(--text2);
    margin-left: 4px;
  }
  .product-link {
    color: var(--text2);
    text-decoration: none;
    font-size: 0.75rem;
  }
  .product-link:hover { color: var(--accent); text-decoration: underline; }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .status-badge.in-stock { background: #e8f5e9; color: #2e7d32; }
  .status-badge.out-of-stock { background: #ffebee; color: #c62828; }

  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text2);
    font-size: 0.78rem;
  }
  .footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 768px) {
    .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .price-table td, .price-table th { padding: 8px 12px; font-size: 0.78rem; }
  }
</style>

  { key: 'europe', label: 'Europe', flag: '🌍', countries: ['GB', 'DE', 'IE', 'ES', 'FR', 'NL', 'SE', 'PL', 'AT', 'CH', 'IT', 'CZ', 'DK', 'PT', 'GR'] },
  { key: 'asia', label: 'Asia', flag: '🌏', countries: ['IN', 'SG', 'IL', 'JP', 'KR', 'MY', 'PH', 'TH', 'AE', 'HK', 'TW', 'VN', 'PK'] },

  { key: 'africa', label: 'Africa', flag: '🌍', countries: ['ZA'] },
];
function getContinent(country) {
  for (var ci = 0; ci < CONTINENTS.length; ci++) { if (CONTINENTS[ci].countries.indexOf(country) !== -1) return CONTINENTS[ci]; }
  return null;
}
function countryFlag(code) {
  if (code === 'US') return '🇺🇸'; if (code === 'CA') return '🇨🇦'; if (code === 'MX') return '🇲🇽';
  if (code === 'GB') return '🇬🇧'; if (code === 'DE') return '🇩🇪'; if (code === 'IE') return '🇮🇪';
  if (code === 'ES') return '🇪🇸'; if (code === 'FR') return '🇫🇷'; if (code === 'NL') return '🇳🇱';
  if (code === 'SE') return '🇸🇪'; if (code === 'PL') return '🇵🇱'; if (code === 'AT') return '🇦🇹';
  if (code === 'CH') return '🇨🇭'; if (code === 'IT') return '🇮🇹'; if (code === 'CZ') return '🇨🇿';
  if (code === 'DK') return '🇩🇰'; if (code === 'BR') return '🇧🇷'; if (code === 'CL') return '🇨🇱';
  if (code === 'AU') return '🇦🇺'; if (code === 'NZ') return '🇳🇿'; if (code === 'IN') return '🇮🇳';
  if (code === 'SG') return '🇸🇬'; if (code === 'IL') return '🇮🇱'; if (code === 'JP') return '🇯🇵';
  if (code === 'KR') return '🇰🇷'; if (code === 'MY') return '🇲🇾'; if (code === 'PH') return '🇵🇭';
  if (code === 'TH') return '🇹🇭'; if (code === 'AE') return '🇦🇪'; if (code === 'PK') return '🇵🇰'; if (code === 'HK') return '🇭🇰';
  if (code === 'TW') return '🇹🇼'; if (code === 'ZA') return '🇿🇦';
  if (code === 'PT') return '🇵🇹'; if (code === 'GR') return '🇬🇷';
  if (code === 'VN') return '🇻🇳';
  if (code === 'CO') return '🇨🇴'; if (code === 'AR') return '🇦🇷';
  return '';
}

var PRODUCTS = {
  'r3-bundle': 'R3 Bundle', 'r3-xbox': 'R3 Bundle Xbox',
  'r5-bundle': 'R5 Bundle', 'r9-bundle': 'R9 Bundle', 'r5-truck': 'R5 Truck Sim Bundle',
  'r3-base': 'R3 Wheel Base', 'r5-base': 'R5 Wheel Base', 'r7-base': 'R7 Wheel Base',
  'r9-base': 'R9 Wheel Base', 'r9-v3-base': 'R9 V3 Wheel Base',

  'ab6-bundle': 'AB6 Flight Simulator', 'ab9-base': 'AB9 FFB Base',
  'mhg-stick': 'MHG Flightstick', 'mh16-stick': 'MH16 Flightstick',
  'ma3x-stick': 'MA3X Side Stick', 'ay210-yoke': 'AY210 FFB Yoke Bundle',
  'mtq-throttle': 'MTQ Throttle Quadrant', 'mtp-throttle': 'MTP Throttle',
  'mtlp-panel': 'MTLP Panel', 'mrp-pedals': 'MRP Rudder Pedals',
  'mfy-yoke': 'MFY Flight Yoke', 'flight-base-clamp': 'Flight Base Clamp',
  'mrp-damper': 'MRP Adjustable Damper', 'tqa': 'TQA Throttle Module', 'tqb': 'TQB Throttle Module',
};
var data = null;
var selectedRetailer = 'all';
var selectedBrand = 'all';
var selectedContinent = 'all';

function currencySymbol(currency) {
  if (currency === 'EUR') return '\u20AC';
  if (currency === 'GBP') return '\u00A3';
  if (currency === 'PLN') return 'z\u0142';
  if (currency === 'INR') return '\u20B9';
  if (currency === 'BRL') return 'R$';
  if (currency === 'SEK' || currency === 'DKK') return 'kr';
  if (currency === 'NZD') return 'NZ$';
  if (currency === 'SGD') return 'S$';
  if (currency === 'HKD') return 'HK$';
  if (currency === 'TWD') return 'NT$';
  if (currency === 'KRW') return '\u20A9';
  if (currency === 'ILS') return '\u20AA';
  if (currency === 'MYR') return 'RM';
  if (currency === 'MXN') return 'MX$';
  if (currency === 'CLP') return 'CLP$';
  if (currency === 'ZAR') return 'R';
  if (currency === 'CHF') return 'CHF';
  if (currency === 'PHP') return '\u20B1';
  if (currency === 'THB') return '\u0E3F';
  if (currency === 'CZK') return 'K\u010D';
  if (currency === 'AED') return 'AED';
  if (currency === 'PKR') return 'Rs';
  if (currency === 'JPY') return '\u00A5';
  if (currency === 'VND') return '\u20AB';
  if (currency === 'COP') return 'COL$';
  if (currency === 'CAD') return 'C$';
  if (currency === 'AUD') return 'A$';
  return '$';
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  var diff = Date.now() - new Date(dateStr).getTime();
  var min = Math.floor(diff / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return min + 'm ago';
  var h = Math.floor(min / 60);
  if (h < 24) return h + 'h ago';
  var d = Math.floor(h / 24);
  return d + 'd ago';
}

function loadData(cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'price-data.json?' + Date.now(), true);
  xhr.onload = function() {
    try {
      data = JSON.parse(xhr.responseText);
      cb();
    } catch (e) { cb(); }
  };
  xhr.onerror = function() { cb(); };
  xhr.send();
}

function getProductPrices() {
  var map = {};
  if (!data || !data.prices) return map;
  for (var pid in data.prices) {
    var retailers = data.prices[pid];
    var entries = [];
    for (var rid in retailers) {
      entries.push({ retailerId: rid, info: retailers[rid] });
    }
    entries.sort(function(a, b) { return a.info.price - b.info.price; });
    map[pid] = entries;
  }
  return map;
}

function getLowestPrice(entries) {
  if (!entries || entries.length === 0) return null;
  var lowest = entries[0];
  // Skip $0 prices
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].info.price > 0) { lowest = entries[i]; break; }
  }
  return lowest;
}

function renderContinentFilters() {
  var container = document.getElementById('continentFilter');
  var html = '<button class="retailer-pill' + (selectedContinent === 'all' ? ' continent-active' : '') + '" onclick="selectedContinent=\'all\';selectedRetailer=\'all\';render()">All Continents</button>';
  for (var ci = 0; ci < CONTINENTS.length; ci++) {
    var c = CONTINENTS[ci];
    html += '<button class="retailer-pill' + (selectedContinent === c.key ? ' continent-active' : '') + '" onclick="selectedContinent=\'' + c.key + '\';selectedRetailer=\'all\';render()">' + c.flag + ' ' + c.label + '</button>';
  }
  container.innerHTML = html;
}

function renderBrandFilters() {
  var container = document.getElementById('brandFilter');
  var html = '<button class="retailer-pill ' + (selectedBrand === 'all' ? 'active' : '') + '" onclick="selectedBrand=\'all\';render()">All Brands</button>';
  for (var bi = 0; bi < BRAND_ORDER.length; bi++) {
    var b = BRAND_ORDER[bi];
    html += '<button class="retailer-pill ' + (selectedBrand === b ? 'active' : '') + '" onclick="selectedBrand=\'' + b + '\';render()" style="' + (selectedBrand === b ? 'background:' + BRAND_COLORS[b] + ';color:white;border-color:' + BRAND_COLORS[b] : '') + '">' + b + '</button>';
  }
  container.innerHTML = html;
}

function renderRetailerFilters() {
  var container = document.getElementById('retailerFilter');
  var html = '<button class="retailer-pill ' + (selectedRetailer === 'all' ? 'active' : '') + '" onclick="selectedRetailer=\'all\';render()">All</button>';
  var seen = {};
  for (var pid in (data ? data.prices : {})) {
    for (var rid in data.prices[pid]) {
      if (!seen[rid]) {
        seen[rid] = true;
        if (selectedContinent !== 'all') {
          var rc = RETAILERS[rid] || {};
          var cont = getContinent(rc.country);
          if (!cont || cont.key !== selectedContinent) continue;
        }
        var r = RETAILERS[rid] || { name: rid, country: '' };
        html += '<button class="retailer-pill ' + (selectedRetailer === rid ? 'active' : '') + '" onclick="selectedRetailer=\'' + rid + '\';render()">' + r.name + '</button>';
      }
    }
  }
  container.innerHTML = html;
}

function convertToUsd(price, currency) {
  if (currency === 'USD') return price;
  if (currency === 'EUR') return price * 1.08;
  if (currency === 'GBP') return price * 1.27;
  if (currency === 'CAD') return price * 0.73;
  if (currency === 'AUD') return price * 0.66;
  if (currency === 'PLN') return price * 0.25;
  if (currency === 'INR') return price * 0.012;
  if (currency === 'BRL') return price * 0.19;
  if (currency === 'SEK') return price * 0.093;
  if (currency === 'DKK') return price * 0.145;
  if (currency === 'NZD') return price * 0.61;
  if (currency === 'SGD') return price * 0.74;
  if (currency === 'HKD') return price * 0.128;
  if (currency === 'TWD') return price * 0.031;
  if (currency === 'KRW') return price * 0.00072;
  if (currency === 'ILS') return price * 0.27;
  if (currency === 'MYR') return price * 0.21;
  if (currency === 'MXN') return price * 0.055;
  if (currency === 'CLP') return price * 0.0011;
  if (currency === 'ZAR') return price * 0.055;
  if (currency === 'CHF') return price * 1.11;
  if (currency === 'PHP') return price * 0.017;
  if (currency === 'THB') return price * 0.028;
  if (currency === 'CZK') return price * 0.043;
  if (currency === 'AED') return price * 0.27;
  if (currency === 'JPY') return price * 0.0069;
  if (currency === 'VND') return price * 0.000041;
  if (currency === 'COP') return price * 0.00024;
  if (currency === 'PKR') return price * 0.0036;
  return price;
}

function render() {
  if (!data) return;
  renderContinentFilters();
  renderBrandFilters();
  renderRetailerFilters();
  var grid = document.getElementById('productGrid');
  var banner = document.getElementById('alertBanner');
  var productPrices = getProductPrices();
  var search = document.getElementById('searchInput').value.toLowerCase().trim();

  var records = 0;
  var alerts = 0;
  var retailerSet = {};

  var productIds = Object.keys(data.prices);
  document.getElementById('statProducts').textContent = productIds.length;

  var alertCount = 0;
  // Collect valid products with all computed data
  var toRender = [];
  for (var pi = 0; pi < productIds.length; pi++) {
    var pid = productIds[pi];

    var brand = BRAND_MAP[pid] || '';
    if (selectedBrand !== 'all' && brand !== selectedBrand) continue;

    var productName = PRODUCTS[pid] || pid.replace(/-/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); });
    if (search && productName.toLowerCase().indexOf(search) === -1) continue;

    var entries = productPrices[pid] || [];
    var filtered = entries.filter(function(e) {
      if (selectedRetailer !== 'all' && e.retailerId !== selectedRetailer) return false;
      if (selectedContinent !== 'all') {
        var rc = RETAILERS[e.retailerId] || {};
        var cont = getContinent(rc.country);
        if (!cont || cont.key !== selectedContinent) return false;
      }
      return true;
    });

    if (filtered.length === 0) continue;
    var lowest = getLowestPrice(filtered);
    if (!lowest) continue;
    records += filtered.length;
    for (var fi = 0; fi < filtered.length; fi++) retailerSet[filtered[fi].retailerId] = true;

    var msrp = (data.msrp && data.msrp[pid]) ? data.msrp[pid] : null;
    var lowestPrice = lowest.info.price;
    var lowestUsd = convertToUsd(lowestPrice, lowest.info.currency);
    var isBelowMsrp = msrp && lowestPrice > 0 && lowestUsd < msrp * 0.95;
    if (isBelowMsrp) alertCount++;

    var sym = currencySymbol(lowest.info.currency);
    var lowestClass = 'good';
    if (isBelowMsrp) lowestClass = 'warn';
    if (lowestPrice === 0) lowestClass = 'bad';

    toRender.push({
      pid: pid, brand: brand, subcat: (brand === 'Moza RS21' && SUBCATEGORY_MAP[pid]) || '',
      productName: productName, brandColor: BRAND_COLORS[brand] || '#888',
      msrp: msrp, lowestPrice: lowestPrice, sym: sym, lowestClass: lowestClass,
      isBelowMsrp: isBelowMsrp, filtered: filtered
    });
  }

  // Sort: brand order → sub-category order → product name
  toRender.sort(function(a, b) {
    var biA = BRAND_ORDER.indexOf(a.brand); if (biA === -1) biA = 999;
    var biB = BRAND_ORDER.indexOf(b.brand); if (biB === -1) biB = 999;
    if (biA !== biB) return biA - biB;
    var siA = a.subcat ? SUBCATEGORY_ORDER.indexOf(a.subcat) : -1; if (siA === -1) siA = 999;
    var siB = b.subcat ? SUBCATEGORY_ORDER.indexOf(b.subcat) : -1; if (siB === -1) siB = 999;
    if (siA !== siB) return siA - siB;
    return a.productName < b.productName ? -1 : a.productName > b.productName ? 1 : 0;
  });

  // Render with sub-category headers
  var html = '';
  var lastSubcat = null;
  for (var ri = 0; ri < toRender.length; ri++) {
    var item = toRender[ri];

    // Sub-category header for RS21
    if (item.brand === 'Moza RS21' && item.subcat && item.subcat !== lastSubcat) {
      lastSubcat = item.subcat;
      html += '<div class="subcat-header">' + (SUBCATEGORY_LABELS[item.subcat] || item.subcat) + '</div>';
    }

    html += '<div class="product-row">';
    html += '<div class="product-header" onclick="toggleRow(this)">';
    html += '<div style="display:flex;align-items:center;gap:10px">';
    html += '<span class="product-name">' + item.productName + '</span>';
    if (item.brand) html += '<span class="product-category" style="background:' + item.brandColor + ';color:white">' + item.brand + '</span>';
    if (item.msrp) html += '<span style="font-size:0.75rem;color:var(--text2)">MSRP: $' + item.msrp + '</span>';
    html += '</div>';
    html += '<div class="product-summary">';
    html += '<span class="count">' + item.filtered.length + ' retailer(s)</span>';
    html += '<span class="lowest ' + item.lowestClass + '">From ' + item.sym + item.lowestPrice.toFixed(2) + '</span>';
    html += '<span class="expand-icon">&#9660;</span>';
    html += '</div>';
    html += '</div>';

    html += '<div class="price-table">';
    html += '<table>';
    html += '<tr><th>Retailer</th><th>Price</th><th>vs MSRP</th><th>Status</th><th>Checked</th><th></th></tr>';

    // Group retailers by continent
    var continentGroups = {};
    for (var ei = 0; ei < item.filtered.length; ei++) {
      var er = RETAILERS[item.filtered[ei].retailerId] || { country: '' };
      var cont = getContinent(er.country);
      var ckey = cont ? cont.key : 'other';
      if (!continentGroups[ckey]) continentGroups[ckey] = [];
      continentGroups[ckey].push(item.filtered[ei]);
    }
    for (var ci = 0; ci < CONTINENTS.length; ci++) {
      var group = continentGroups[CONTINENTS[ci].key];
      if (!group || group.length === 0) continue;
      html += '<tr class="continent-header-row"><td colspan="6">' + CONTINENTS[ci].flag + ' ' + CONTINENTS[ci].label + '</td></tr>';
      for (var ei = 0; ei < group.length; ei++) {
        var e = group[ei];
        var r = RETAILERS[e.retailerId] || { name: e.retailerId, country: '', currency: 'USD' };
        var sym2 = currencySymbol(e.info.currency);

        var priceUsd = convertToUsd(e.info.price, e.info.currency);
        var msrpDiff = null;
        if (item.msrp && e.info.price > 0) {
          msrpDiff = ((priceUsd - item.msrp) / item.msrp * 100).toFixed(1);
        }

        var dotClass = 'green';
        if (e.info.price === 0) dotClass = 'gray';
        else if (msrpDiff && parseFloat(msrpDiff) < -5) dotClass = 'red';
        else if (msrpDiff && parseFloat(msrpDiff) < 0) dotClass = 'yellow';

        html += '<tr>';
        html += '<td><span class="retailer-name">' + r.name + '</span><span class="retailer-country">' + countryFlag(r.country) + ' ' + r.country + '</span></td>';
        html += '<td><span class="price-flag"><span class="dot ' + dotClass + '"></span>' + sym2 + (e.info.price > 0 ? e.info.price.toFixed(2) : 'N/A') + '</span></td>';
        html += '<td style="font-size:0.85rem;font-weight:600;';
        if (msrpDiff && parseFloat(msrpDiff) < -5) html += 'color:var(--accent)';
        else if (msrpDiff && parseFloat(msrpDiff) < 0) html += 'color:var(--orange)';
        else html += 'color:var(--green)';
        html += '">';
        if (msrpDiff) html += (parseFloat(msrpDiff) > 0 ? '+' : '') + msrpDiff + '%';
        else html += '-';
        html += '</td>';
        html += '<td><span class="status-badge ' + (e.info.inStock ? 'in-stock' : 'out-of-stock') + '">' + (e.info.inStock ? 'In Stock' : 'Out of Stock') + '</span></td>';
        html += '<td style="font-size:0.75rem;color:var(--text2)">' + timeAgo(e.info.checkedAt) + '</td>';
        html += '<td><a class="product-link" href="' + e.info.url + '" target="_blank">View &#8599;</a></td>';
        html += '</tr>';
      }
    }
    html += '</table>';
    html += '</div>';
    html += '</div>';
  }

  grid.innerHTML = html;
  document.getElementById('statRetailers').textContent = Object.keys(retailerSet).length;
  document.getElementById('statRecords').textContent = records;
  document.getElementById('statAlerts').textContent = alertCount;

  if (alertCount > 0) {
    banner.classList.add('show');
    banner.innerHTML = '<span class="icon">&#9888;</span> <span class="count">' + alertCount + '</span> product(s) priced below MSRP &mdash; possible MAP violation';
  } else {
    banner.classList.remove('show');
  }
}

function toggleRow(header) {
  var row = header.parentElement;
  var table = row.querySelector('.price-table');
  var icon = row.querySelector('.expand-icon');
  table.classList.toggle('open');
  icon.classList.toggle('open');
}

loadData(function() {
  if (data && data.lastUpdated) {
    document.getElementById('lastUpdate').textContent = 'Last updated: ' + timeAgo(data.lastUpdated) + ' (' + new Date(data.lastUpdated).toLocaleString() + ')';
  }
  render();
});
</script>
